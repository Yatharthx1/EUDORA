<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EUDORA - Smart Navigation</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <aside class="panel">
    <div class="panel-inner">

      <div class="logo">
        <div class="logo-mark">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z" fill="currentColor"/>
            <circle cx="12" cy="9" r="2.5" fill="var(--bg-panel)"/>
          </svg>
        </div>
        <div>
          <div class="logo-name">EUDORA</div>
          <div class="logo-sub">Indore Smart Routing</div>
        </div>
      </div>

      <div class="search-block">
        <div class="input-row">
          <span class="dot dot-a"></span>
          <div class="input-wrap">
            <input id="input-origin" type="text" placeholder="From..." autocomplete="off" spellcheck="false" />
            <div class="suggestions" id="sug-origin"></div>
          </div>
        </div>

        <div class="input-connector">
          <div class="connector-line"></div>
          <button class="swap-btn" id="swap-btn" title="Swap">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <path d="M7 16V4m0 0L3 8m4-4l4 4M17 8v12m0 0l4-4m-4 4l-4-4"/>
            </svg>
          </button>
          <div class="connector-line"></div>
        </div>

        <div class="input-row">
          <span class="dot dot-b"></span>
          <div class="input-wrap">
            <input id="input-dest" type="text" placeholder="To..." autocomplete="off" spellcheck="false" />
            <div class="suggestions" id="sug-dest"></div>
          </div>
        </div>

        <button class="go-btn" id="go-btn">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
          Get Routes
        </button>
      </div>

      <div class="route-list" id="route-list">

        <div class="placeholder" id="placeholder">
          <div class="ph-icon">
            <svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="0.8">
              <circle cx="12" cy="12" r="10"/>
              <path d="M12 8v4l3 3"/>
              <path d="M3.05 11a9 9 0 1 0 .5-2.7"/>
            </svg>
          </div>
          <p>Enter a start and destination<br/>to explore route options</p>
        </div>

        <div class="loading" id="loading" style="display:none">
          <div class="ring"></div>
          <span>Computing optimal routes...</span>
        </div>

        <div id="cards"></div>
      </div>

    </div>

    <div class="panel-foot">
      <span>Leaflet + OSM</span>
      <span class="foot-sep"></span>
      <span>Zero API keys for map</span>
    </div>
  </aside>

  <div class="map-wrap">
    <div id="map"></div>
    <div class="route-pill" id="route-pill" style="display:none">
      <div class="pill-name" id="pill-name"></div>
      <div class="pill-stats" id="pill-stats"></div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
