<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>EUDORA — Smart Navigation</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=IBM+Plex+Mono:wght@400;500;600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="scanlines" aria-hidden="true"></div>

  <aside class="panel">
    <header class="panel-header">
      <div class="brand">
        <div class="brand-mark">
          <div class="brand-ring"></div>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
            <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z" fill="currentColor"/>
            <circle cx="12" cy="9" r="2.5" fill="var(--brand-hole)"/>
          </svg>
        </div>
        <div>
          <div class="brand-name">EUDORA</div>
          <div class="brand-tagline">NAVIGATION · INDORE</div>
        </div>
      </div>
      <div class="header-right">
<button class="ctrl-btn" id="theme-toggle" aria-label="Toggle theme">
          <svg class="icon-sun" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
          </svg>
          <svg class="icon-moon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
      </div>
    </header>

    <div class="spectrum-bar">
      <div class="s-seg" style="--c:#f0a500"></div>
      <div class="s-seg" style="--c:#0bbfb0"></div>
      <div class="s-seg" style="--c:#22c55e"></div>
      <div class="s-seg" style="--c:#7c6aff"></div>
    </div>

    <section class="search-block" id="search-block">
      <div class="block-label">
        <span class="label-dot"></span>ROUTE INPUT
      </div>

      <div class="waypoint-group">
        <div class="wp-row">
          <div class="wp-glyph wp-a">A</div>
          <div class="wp-field-wrap">
            <input id="input-origin" type="text" placeholder="Starting point…" autocomplete="off" spellcheck="false" />
            <div class="suggestions" id="sug-origin"></div>
          </div>
          <!-- GPS button — uses device location for origin -->
          <button class="wp-clear" id="gps-btn" aria-label="Use my location" title="Use my location" style="color: var(--accent, #7c6aff);">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <circle cx="12" cy="12" r="3" fill="currentColor"/>
              <path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>
              <circle cx="12" cy="12" r="8" stroke-opacity="0.3"/>
            </svg>
          </button>
          <button class="wp-clear" id="clear-origin" aria-label="Clear">
            <svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>

        <div class="wp-track">
          <div class="track-dots"><span></span><span></span><span></span></div>
          <button class="swap-btn" id="swap-btn" aria-label="Swap">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <path d="M7 16V4m0 0L3 8m4-4l4 4M17 8v12m0 0l4-4m-4 4l-4-4"/>
            </svg>
          </button>
        </div>

        <div class="wp-row">
          <div class="wp-glyph wp-b">B</div>
          <div class="wp-field-wrap">
            <input id="input-dest" type="text" placeholder="Destination…" autocomplete="off" spellcheck="false" />
            <div class="suggestions" id="sug-dest"></div>
          </div>
          <button class="wp-clear" id="clear-dest" aria-label="Clear">
            <svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
      </div>

      <button class="compute-btn" id="go-btn">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        COMPUTE ROUTES
      </button>
    </section>

    <div class="rule"></div>

    <section class="results-block" id="results-section">
      <div class="block-label">
        <span class="label-dot"></span>ROUTE OPTIONS
      </div>

      <div class="empty-state" id="empty-state">
        <div class="empty-icon">
          <svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
            <circle cx="12" cy="12" r="10"/>
            <path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
          </svg>
        </div>
        <p>Set origin and destination<br/>to begin route analysis</p>
      </div>

      <div class="loading-state" id="loading-state" style="display:none">
        <div class="loading-bars">
          <span></span><span></span><span></span><span></span><span></span>
        </div>
        <span>Analysing road network…</span>
      </div>

      <div id="cards"></div>
    </section>

    <footer class="panel-footer">
      <span>OSM · LocationIQ · TomTom</span>
      <span id="footer-clock" class="footer-clock"></span>
    </footer>
  </aside>

  <div class="map-region">
    <div id="map"></div>
    <div class="route-pill" id="active-pill" style="display:none">
      <div class="pill-color-bar" id="pill-color"></div>
      <div class="pill-label" id="pill-name"></div>
      <div class="pill-sep"></div>
      <div class="pill-data" id="pill-stats"></div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
